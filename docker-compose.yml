services:
  experiments:
    build:
      context: .
      secrets:
        - github_ssh_key
    image: modded-nanogpt-experiments:latest
    stdin_open: true
    tty: true
    working_dir: /workspace
    volumes:
      - experiments-workspace:/workspace
      - codex-state:/workspace/.codex
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]

secrets:
  github_ssh_key:
    file: ${GITHUB_SSH_KEY}

volumes:
  experiments-workspace:
  codex-state:
